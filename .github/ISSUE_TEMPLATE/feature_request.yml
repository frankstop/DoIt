name: Feature request
description: Propose an improvement to a current workflow.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What task is difficult or missing today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
